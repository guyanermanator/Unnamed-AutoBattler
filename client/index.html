<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unnamed Auto Battler</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        overflow: hidden;
      }

      #game-container {
        position: relative;
        background: #000;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #debug-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        pointer-events: none;
        display: none;
      }

      #debug-overlay.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="debug-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
