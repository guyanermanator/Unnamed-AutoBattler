version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autobattler
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autobattler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ******postgres:5432/autobattler
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 3000
    depends_on:
      - postgres

volumes:
  postgres_data:
