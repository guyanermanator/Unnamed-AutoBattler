databases:
  - name: autobattler-db
    plan: free
    databaseName: autobattler
    user: autobattler

services:
  - type: web
    name: autobattler-server
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npx prisma migrate deploy --schema=server/prisma/schema.prisma && node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autobattler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: autobattler-client
    runtime: static
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=client
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
